      const screens = [...root.querySelectorAll(&quot;[data-screen]&quot;)];
      const walletEl = root.querySelector(&quot;[data-wallet]&quot;);
      const marshmallowsEl = root.querySelector(&quot;[data-marshmallows]&quot;);
      const shopMessageEl = root.querySelector(&quot;[data-shop-message]&quot;);
      const buyButtons = [...root.querySelectorAll(&quot;[data-buy]&quot;)];
      const shopCards = [...root.querySelectorAll(&quot;[data-shop-card]&quot;)];
      const shopSelectButtons = [...root.querySelectorAll(&quot;[data-shop-select]&quot;)];
      const shopCloseBtn = root.querySelector(&quot;[data-shop-close]&quot;);
      const previewBuyBtn = root.querySelector(&quot;[data-preview-buy]&quot;);
      const previewTitleEl = root.querySelector(&quot;[data-preview-title]&quot;);
      const previewDescriptionEl = root.querySelector(&quot;[data-preview-description]&quot;);
      const previewPointsEl = root.querySelector(&quot;[data-preview-points]&quot;);
      const previewTreatsEl = root.querySelector(&quot;[data-preview-treats]&quot;);
      const previewOwnedEl = root.querySelector(&quot;[data-preview-owned]&quot;);
      const previewImageEl = root.querySelector(&quot;[data-preview-image]&quot;);
      const previewHeroEl = root.querySelector(&quot;[data-preview-hero]&quot;);
      const previewCostImageEl = root.querySelector(&quot;[data-preview-cost-image]&quot;);
      const previewCostTitleEl = root.querySelector(&quot;[data-preview-cost-title]&quot;);
      const assetSources = JSON.parse(root.querySelector(&quot;[data-zefirok-assets]&quot;).textContent);
      const avatarImg = root.querySelector(&quot;[data-avatar-sprite]&quot;);
      if (assetSources.avatar &amp;&amp; avatarImg) {
        avatarImg.src = assetSources.avatar;
        avatarImg.closest(&quot;.avatar&quot;).classList.add(&quot;has-image&quot;);
      }
      for (const img of root.querySelectorAll(&quot;[data-shop-img]&quot;)) {
        const key = img.dataset.shopImg;
        if (assetSources[key]) img.src = assetSources[key];
      }
      const assets = {};
      for (const [name, src] of Object.entries(assetSources)) {
        assets[name] = new Image();
        assets[name].src = src;
        assets[name].addEventListener(&quot;load&quot;, () =&gt; {
          if (!state.running) draw();
        });
      }

      const state = {
        running: false,
        paused: false,
        over: false,
        time: 0,
        last: 0,
        score: 0,
        best: 0,
        treats: 0,
        runTreats: 0,
        wallet: 0,
        inventory: {},
        speed: 210,
        spawn: 0,
        treatSpawn: 0,
        obstacles: [],
        pickups: [],
        crumbs: []
      };
      const formatter = new Intl.NumberFormat(&quot;ru-RU&quot;);
      const shopProducts = {
        zefir: {
          title: &quot;Зефир в кафе&quot;,
          description: &quot;Самый воздушный зефир для гостей&quot;,
          points: 20000,
          treats: 120,
          image: &quot;shopMarshmallow&quot;
        },
        cheesecake: {
          title: &quot;Чизкейк&quot;,
          description: &quot;Нежный десерт с ягодным соусом&quot;,
          points: 30000,
          treats: 180,
          image: &quot;shopCheesecake&quot;
        },
        chocolate_cake: {
          title: &quot;Шоколадный торт&quot;,
          description: &quot;Шоколадный бисквит с кремом&quot;,
          points: 40000,
          treats: 240,
          image: &quot;shopChocolateCake&quot;
        },
        macaron: {
          title: &quot;Макарон&quot;,
          description: &quot;Французский десерт с нежной начинкой&quot;,
          points: 50000,
          treats: 300,
          image: &quot;shopMacaron&quot;
        }
      };
      let selectedProductId = &quot;zefir&quot;;
      const storageKey = &quot;zefirok-runner-progress-v1&quot;;
      loadProgress();

      const dog = {
        x: 46,
        y: 0,
        w: 100,
        h: 88,
        vy: 0,
        grounded: true
      };

      const ground = { y: 0 };
      const gravity = 1680;
      const jumpVelocity = -745;

      function resize() {
        const rect = canvas.getBoundingClientRect();
        const scale = window.devicePixelRatio || 1;
        canvas.width = Math.max(320, Math.floor(rect.width * scale));
        canvas.height = Math.max(270, Math.floor(rect.height * scale));
        ctx.setTransform(scale, 0, 0, scale, 0, 0);
        dog.x = Math.max(34, rect.width * 0.105);
        ground.y = rect.height - Math.max(52, rect.height * 0.15);
        dog.y = Math.min(dog.y || 0, ground.y - dog.h);
        if (!state.running) {
          dog.y = ground.y - dog.h;
          draw();
        }
      }

      function reset() {
        state.running = true;
        state.paused = false;
        state.over = false;
        state.time = 0;
        state.last = performance.now();
        state.score = 0;
        state.runTreats = 0;
        state.speed = 165;
        state.spawn = 4.2;
        state.treatSpawn = 0.7;
        state.obstacles = [];
        state.pickups = [];
        state.crumbs = [];
        dog.y = ground.y - dog.h;
        dog.vy = 0;
        dog.grounded = true;
        overlay.style.display = &quot;none&quot;;
        statusEl.textContent = &quot;бежим&quot;;
        startBtn.textContent = &quot;Заново&quot;;
        requestAnimationFrame(loop);
      }

      function jump() {
        if (state.paused) {
          resume();
          return;
        }
        if (!state.running) {
          reset();
          return;
        }
        if (dog.grounded) {
          dog.vy = jumpVelocity;
          dog.grounded = false;
          puff(dog.x + 18, ground.y - 6, 7);
        }
      }

      function togglePause() {
        if (state.over) return;
        if (!state.running &amp;&amp; !state.paused) {
          reset();
          return;
        }
        if (state.paused) {
          resume();
          return;
        }
        state.running = false;
        state.paused = true;
        statusEl.textContent = &quot;пауза&quot;;
        showModal(&quot;Пауза&quot;, &quot;Тапни по витрине или нажми «Пауза», чтобы продолжить.&quot;);
      }

      function resume() {
        state.paused = false;
        state.running = true;
        state.last = performance.now();
        overlay.style.display = &quot;none&quot;;
        statusEl.textContent = &quot;бежим&quot;;
        requestAnimationFrame(loop);
      }

      function endGame() {
        state.running = false;
        state.over = true;
        state.paused = false;
        const earned = Math.floor(state.score);
        const earnedTreats = state.runTreats;
        state.best = Math.max(state.best, state.score);
        state.wallet += earned;
        state.treats += earnedTreats;
        state.runTreats = 0;
        statusEl.textContent = &quot;финиш&quot;;
        startBtn.textContent = &quot;Заново&quot;;
        updateHud();
        saveProgress();
        showModal(
          `Забег окончен: ${Math.floor(state.score)}`,
          `+${earned} очков и +${earnedTreats} зефира в магазин. Рекорд ${Math.floor(state.best)}.`
        );
      }

      function showModal(title, text) {
        overlay.innerHTML = `&lt;div class=&quot;modal&quot;&gt;&lt;div class=&quot;badge&quot;&gt;&lt;/div&gt;&lt;strong&gt;${title}&lt;/strong&gt;&lt;div class=&quot;rule&quot;&gt;&lt;/div&gt;&lt;span&gt;${text}&lt;/span&gt;&lt;/div&gt;`;
        overlay.style.display = &quot;grid&quot;;
      }

      function loop(now) {
        if (!state.running) return;
        const dt = Math.min(0.033, (now - state.last) / 1000);
        state.last = now;
        update(dt);
        draw();
        requestAnimationFrame(loop);
      }

      function update(dt) {
        state.time += dt;
        const difficulty = getDifficulty();
        state.speed = Math.min(330, state.speed + dt * (2.8 + difficulty * 6.2));
        state.score += dt * 10 + state.speed * dt * 0.018;

        dog.vy += gravity * dt;
        dog.y += dog.vy * dt;
        if (dog.y &gt;= ground.y - dog.h) {
          dog.y = ground.y - dog.h;
          dog.vy = 0;
          dog.grounded = true;
        }

        state.spawn -= dt;
        if (state.spawn &lt;= 0) {
          spawnObstacle();
          state.spawn = nextObstacleDelay();
        }

        state.treatSpawn -= dt;
        if (state.treatSpawn &lt;= 0) {
          spawnPickup();
          state.treatSpawn = nextTreatDelay();
        }

        for (const item of state.obstacles) item.x -= state.speed * dt;
        for (const item of state.pickups) {
          item.x -= state.speed * dt;
          item.float += dt * 6;
        }
        for (const crumb of state.crumbs) {
          crumb.x += crumb.vx * dt;
          crumb.y += crumb.vy * dt;
          crumb.life -= dt;
        }

        state.obstacles = state.obstacles.filter((item) =&gt; item.x &gt; -120);
        state.pickups = state.pickups.filter((item) =&gt; item.x &gt; -70 &amp;&amp; !item.got);
        state.crumbs = state.crumbs.filter((crumb) =&gt; crumb.life &gt; 0);

        const dogBox = getDogHitbox();
        for (const item of state.obstacles) {
          if (collidesWithObstacle(dogBox, item)) {
            endGame();
            return;
          }
        }

        const dogPickupBox = getDogPickupBox();
        for (const item of state.pickups) {
          const box = { x: item.x + 2, y: item.y + 2, w: item.size - 4, h: item.size - 4 };
          if (overlap(dogPickupBox, box)) {
            item.got = true;
            state.runTreats += 1;
            state.score += 35;
            puff(item.x + item.size / 2, item.y + item.size / 2, 10);
            updateHud();
          }
        }
        updateHud();
      }

      function updateHud() {
        scoreEl.textContent = formatter.format(Math.floor(state.score));
        bestEl.textContent = formatter.format(Math.floor(state.best));
        treatsEl.textContent = formatter.format(state.treats + state.runTreats);
        if (walletEl) walletEl.textContent = formatter.format(Math.floor(state.wallet));
        if (marshmallowsEl) marshmallowsEl.textContent = formatter.format(state.treats);
        for (const button of buyButtons) {
          const id = button.dataset.buy;
          const cost = Number(button.dataset.cost || 0);
          const treatCost = Number(button.dataset.treatCost || 0);
          const ownedEls = [...root.querySelectorAll(`[data-owned=&quot;${id}&quot;]`)];
          for (const ownedEl of ownedEls) ownedEl.textContent = formatter.format(state.inventory[id] || 0);
          button.disabled = state.wallet &lt; cost || state.treats &lt; treatCost;
        }
        updateShopPreview();
      }

      function loadProgress() {
        try {
          const raw = localStorage.getItem(storageKey);
          if (!raw) return;
          const saved = JSON.parse(raw);
          state.wallet = Number(saved.wallet) || 0;
          state.treats = Number(saved.treats) || 0;
          state.inventory = saved.inventory &amp;&amp; typeof saved.inventory === &quot;object&quot; ? saved.inventory : {};
          state.best = Number(saved.best) || 0;
        } catch (error) {
          state.wallet = 0;
          state.treats = 0;
          state.inventory = {};
        }
      }

      function saveProgress() {
        try {
          localStorage.setItem(storageKey, JSON.stringify({
            wallet: Math.floor(state.wallet),
            treats: Math.floor(state.treats),
            inventory: state.inventory,
            best: Math.floor(state.best)
          }));
        } catch (error) {
          // Storage may be unavailable in some in-app browsers.
        }
      }

      function switchScreen(name) {
        for (const button of tabButtons) button.setAttribute(&quot;aria-selected&quot;, String(button.dataset.tab === name));
        for (const screen of screens) screen.hidden = screen.dataset.screen !== name;
        if (name === &quot;shop&quot; &amp;&amp; state.running) togglePause();
        updateHud();
        if (name === &quot;game&quot;) requestAnimationFrame(draw);
      }

      function buyItem(button) {
        const id = button.dataset.buy;
        const cost = Number(button.dataset.cost || 0);
        const treatCost = Number(button.dataset.treatCost || 0);
        if (state.wallet &lt; cost || state.treats &lt; treatCost) {
          const missing = [];
          if (state.wallet &lt; cost) missing.push(`${formatter.format(cost - state.wallet)} очков`);
          if (state.treats &lt; treatCost) missing.push(`${formatter.format(treatCost - state.treats)} зефира`);
          shopMessageEl.textContent = `Не хватает ${missing.join(&quot; и &quot;)}. Ещё один сладкий забег?`;
          return;
        }
        state.wallet -= cost;
        state.treats -= treatCost;
        state.inventory[id] = (state.inventory[id] || 0) + 1;
        const title = shopProducts[id]?.title || button.closest(&quot;.shop-card&quot;)?.querySelector(&quot;strong&quot;)?.textContent || &quot;Покупка&quot;;
        shopMessageEl.textContent = `${title} добавлен в меню кафе.`;
        saveProgress();
        updateHud();
      }

      function selectProduct(id) {
        if (!shopProducts[id]) return;
        selectedProductId = id;
        for (const card of shopCards) card.classList.toggle(&quot;is-active&quot;, card.dataset.shopCard === id);
        updateShopPreview();
      }

      function updateShopPreview() {
        const product = shopProducts[selectedProductId];
        if (!product) return;
        if (previewTitleEl) previewTitleEl.textContent = product.title;
        if (previewDescriptionEl) previewDescriptionEl.textContent = product.description;
        if (previewPointsEl) previewPointsEl.textContent = formatter.format(product.points);
        if (previewTreatsEl) previewTreatsEl.textContent = formatter.format(product.treats);
        if (previewOwnedEl) previewOwnedEl.textContent = formatter.format(state.inventory[selectedProductId] || 0);
        if (previewImageEl &amp;&amp; assetSources[product.image]) previewImageEl.src = assetSources[product.image];
        if (previewHeroEl &amp;&amp; assetSources[product.image]) previewHeroEl.src = assetSources[product.image];
        if (previewCostImageEl &amp;&amp; assetSources[product.image]) previewCostImageEl.src = assetSources[product.image];
        if (previewCostTitleEl) previewCostTitleEl.textContent = product.title;
        if (previewBuyBtn) {
          previewBuyBtn.dataset.buy = selectedProductId;
          previewBuyBtn.dataset.cost = String(product.points);
          previewBuyBtn.dataset.treatCost = String(product.treats);
          previewBuyBtn.textContent = state.wallet &gt;= product.points &amp;&amp; state.treats &gt;= product.treats
            ? &quot;Купить&quot;
            : &quot;Недостаточно&quot;;
          previewBuyBtn.disabled = state.wallet &lt; product.points || state.treats &lt; product.treats;
        }
      }

      function getDifficulty() {
        return Math.max(0, Math.min(1, (state.time - 6) / 55));
      }

      function nextObstacleDelay() {
        const difficulty = getDifficulty();
        const minDelay = 2.05 - difficulty * 0.7;
        const extraDelay = 1.2 - difficulty * 0.42;
        return minDelay + Math.random() * extraDelay;
      }

      function nextTreatDelay() {
        const difficulty = getDifficulty();
        return 0.85 + Math.random() * (1.15 - difficulty * 0.35);
      }

      function spawnObstacle() {
        const type = Math.random() &lt; 0.68 ? &quot;pouf&quot; : &quot;stool&quot;;
        const size = type === &quot;pouf&quot; ? [62, 42] : [44, 44];
        state.obstacles.push({
          type,
          x: canvas.clientWidth + 36,
          y: ground.y - size[1],
          w: size[0],
          h: size[1]
        });
      }

      function spawnPickup() {
        const size = 36;
        const laneTop = Math.max(42, ground.y - 122);
        const laneBottom = Math.max(laneTop + 18, ground.y - 84);
        state.pickups.push({
          x: canvas.clientWidth + 52,
          y: laneTop + Math.random() * (laneBottom - laneTop),
          size,
          float: Math.random() * Math.PI * 2,
          got: false
        });
      }

      function hitbox(item) {
        if (item.type === &quot;pouf&quot;) {
          return {
            x: item.x + item.w * 0.16,
            y: item.y + item.h * 0.62,
            w: item.w * 0.68,
            h: item.h * 0.28
          };
        }
        return {
          x: item.x + item.w * 0.2,
          y: item.y + item.h * 0.6,
          w: item.w * 0.6,
          h: item.h * 0.28
        };
      }

      function getDogHitbox() {
        if (!dog.grounded) {
          return {
            x: dog.x + dog.w * 0.31,
            y: dog.y + dog.h * 0.76,
            w: dog.w * 0.4,
            h: dog.h * 0.12
          };
        }
        return {
          x: dog.x + dog.w * 0.25,
          y: dog.y + dog.h * 0.58,
          w: dog.w * 0.52,
          h: dog.h * 0.3
        };
      }

      function getDogPickupBox() {
        return {
          x: dog.x + dog.w * 0.08,
          y: dog.y + dog.h * 0.12,
          w: dog.w * 0.84,
          h: dog.h * 0.76
        };
      }

      function collidesWithObstacle(dogBox, item) {
        const box = hitbox(item);
        if (!dog.grounded) {
          const dogPaws = dog.y + dog.h * 0.84;
          const clearedObstacle = dogPaws &lt; item.y + item.h * 0.62;
          if (clearedObstacle) return false;
          const airDogBox = {
            x: dog.x + dog.w * 0.42,
            y: dog.y + dog.h * 0.82,
            w: dog.w * 0.28,
            h: dog.h * 0.08
          };
          const airObstacleBox = {
            x: item.x + item.w * 0.16,
            y: item.y + item.h * 0.62,
            w: item.w * 0.68,
            h: item.h * 0.28
          };
          return overlap(airDogBox, airObstacleBox);
        }
        if (overlap(dogBox, box)) return true;
        const visualDogBox = {
          x: dog.x + dog.w * 0.14,
          y: dog.y + dog.h * 0.34,
          w: dog.w * 0.68,
          h: dog.h * 0.54
        };
        const obstacleBodyBox = {
          x: item.x + item.w * 0.08,
          y: item.y + item.h * 0.22,
          w: item.w * 0.84,
          h: item.h * 0.72
        };
        if (overlap(visualDogBox, obstacleBodyBox)) return true;
        return false;
      }

      function overlap(a, b) {
        return a.x &lt; b.x + b.w &amp;&amp; a.x + a.w &gt; b.x &amp;&amp; a.y &lt; b.y + b.h &amp;&amp; a.y + a.h &gt; b.y;
      }

      function puff(x, y, count) {
        for (let i = 0; i &lt; count; i += 1) {
          state.crumbs.push({
            x,
            y,
            vx: -55 - Math.random() * 75,
            vy: -32 + Math.random() * 62,
            r: 2 + Math.random() * 2.8,
            life: 0.35 + Math.random() * 0.35
          });
        }
      }

      function draw() {
        const w = canvas.clientWidth;
        const h = canvas.clientHeight;
        ctx.clearRect(0, 0, w, h);
        drawCafe(w, h);
        for (const pickup of state.pickups) drawMarshmallow(pickup);
        for (const item of state.obstacles) drawObstacle(item);
        for (const crumb of state.crumbs) drawCrumb(crumb);
        drawDog();
        drawForeground(w, h);
      }

      function drawCafe(w, h) {
        const top = h * 0.09;
        ctx.fillStyle = &quot;#fff8f0&quot;;
        ctx.fillRect(0, 0, w, h);

        const gradient = ctx.createLinearGradient(0, 0, w, h);
        gradient.addColorStop(0, &quot;rgba(255, 228, 220, 0.58)&quot;);
        gradient.addColorStop(0.45, &quot;rgba(255, 255, 255, 0.72)&quot;);
        gradient.addColorStop(1, &quot;rgba(247, 221, 205, 0.66)&quot;);
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, w, h);

        drawSunbeams(w, h);
        drawShelf(0, top + 70, w);
        drawShelf(0, ground.y + 22, w);
        drawSign(14, top + 22);
        drawLamp(w - 52, top + 14);
        drawSmallShelfDecor(w);

        ctx.fillStyle = &quot;rgba(244, 198, 185, 0.58)&quot;;
        ctx.fillRect(0, ground.y + 44, w, h - ground.y - 44);
        ctx.strokeStyle = &quot;rgba(212, 165, 137, 0.7)&quot;;
        ctx.lineWidth = 1;
        for (let x = -10; x &lt; w; x += 42) {
          roundRect(x, ground.y + 62, 28, 70, 12, false, true);
        }
      }

      function drawSunbeams(w, h) {
        ctx.save();
        ctx.globalAlpha = 0.36;
        ctx.fillStyle = &quot;#fff&quot;;
        for (let x = -w * 0.2; x &lt; w; x += w * 0.42) {
          ctx.beginPath();
          ctx.moveTo(x, 0);
          ctx.lineTo(x + 52, 0);
          ctx.lineTo(x + 190, h);
          ctx.lineTo(x + 130, h);
          ctx.closePath();
          ctx.fill();
        }
        ctx.restore();
      }

      function drawShelf(x, y, w) {
        ctx.fillStyle = &quot;rgba(255, 255, 255, 0.74)&quot;;
        ctx.fillRect(x, y - 2, w, 34);
        ctx.fillStyle = &quot;#f2d1bf&quot;;
        ctx.fillRect(x, y + 26, w, 8);
        ctx.strokeStyle = &quot;rgba(214, 163, 132, 0.58)&quot;;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(x, y - 2);
        ctx.lineTo(x + w, y - 2);
        ctx.moveTo(x, y + 33);
        ctx.lineTo(x + w, y + 33);
        ctx.stroke();
      }

      function drawSmallShelfDecor(w) {
        const y = Math.max(82, ground.y - 128);
        if (isReady(&quot;stool&quot;)) {
          drawAsset(&quot;stool&quot;, w * 0.36, y, 32, 30, 0.52);
          drawAsset(&quot;stool&quot;, w * 0.62, y - 2, 32, 30, 0.52);
        } else {
          drawStool(w * 0.36, y, 32, 30, 0.52);
          drawStool(w * 0.62, y - 2, 32, 30, 0.52);
        }
        if (isReady(&quot;flowersTall&quot;)) drawAsset(&quot;flowersTall&quot;, w - 58, ground.y - 96, 42, 58, 0.62);
        else drawFlowers(w - 48, ground.y - 98, 0.58);
      }

      function drawForeground(w) {
        ctx.strokeStyle = &quot;rgba(214, 163, 132, 0.7)&quot;;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(0, ground.y);
        ctx.lineTo(w, ground.y);
        ctx.stroke();

        for (let x = -((state.time * state.speed) % 54); x &lt; w + 54; x += 54) {
          ctx.fillStyle = &quot;rgba(255, 255, 255, 0.72)&quot;;
          roundRect(x + 8, ground.y + 18, 28, 6, 4, true);
        }
      }

      function drawSign(x, y) {
        ctx.save();
        ctx.translate(x, y);
        roundRect(0, 0, 76, 86, 4, true, true, &quot;#f7cfc7&quot;, &quot;rgba(214, 163, 132, 0.55)&quot;);
        ctx.fillStyle = &quot;rgba(255,255,255,0.5)&quot;;
        ctx.fillRect(6, 6, 64, 74);
        ctx.save();
        ctx.beginPath();
